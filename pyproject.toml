[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "__pycache__",
  "logs",
  "outputs",
]

[tool.ruff.lint]
select = [
  "B",
  "E",
  "F",
  "I",
  "RUF",
  "SIM",
  "UP",
]
ignore = [
  "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
